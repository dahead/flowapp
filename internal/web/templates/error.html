{{define "error.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fehler — FlowApp</title>
<script>(function(){ const t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); document.documentElement.setAttribute('data-theme',t); })();</script>
<style>
:root{--bg:#e8eaf0;--bg2:#fff;--border:#d4d6e4;--text:#1a1a2e;--text3:#888;--accent:#6c63ff;}
[data-theme="dark"]{--bg:#0f0f17;--bg2:#1a1a2e;--border:#2e2e4a;--text:#e8e8f0;--text3:#5a5a7a;--accent:#7c73ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--bg2);border-radius:16px;padding:2.5rem 2rem;width:400px;max-width:95vw;text-align:center;border:1px solid var(--border);}
.code{font-size:3rem;font-weight:800;color:var(--accent);margin-bottom:0.5rem;}
.msg{color:var(--text3);margin-bottom:1.5rem;}
a{color:var(--accent);text-decoration:none;font-size:0.9rem;}
</style>
</head>
<body>
<div class="card">
  <div class="code">{{.Code}}</div>
  <div class="msg">{{.Message}}</div>
  <a href="/">← Zurück zum Board</a>
</div>
</body>
</html>
{{end}}
