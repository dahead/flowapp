{{define "new_instance.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/static/app.css">
<link rel="stylesheet" href="/static/common.css">
<link rel="stylesheet" href="/static/auth.css">
<title>New Instance — FlowApp</title>
<script src="/static/theme-init.js"></script>
<style>
.field{display:flex;flex-direction:column;gap:0.25rem;margin-bottom:0.9rem;}
.field label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);}
.field input,.field select{border:1.5px solid var(--border);border-radius:7px;padding:0.42rem 0.65rem;font-size:0.92rem;font-family:inherit;outline:none;background:var(--bg);color:var(--text);}
.field input:focus,.field select:focus{border-color:var(--accent);}
.var-hint{font-size:0.72rem;color:var(--text3);margin-top:0.1rem;}
.actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;}
.btn{padding:0.45rem 1.1rem;border:none;border-radius:7px;cursor:pointer;font-size:0.88rem;font-weight:600;}
.btn-primary{background:var(--accent);color:white;}.btn-primary:hover{background:var(--accent2);}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--text3);}
.divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0;}
</style>
</head>
<body>
<div class="card">
  <h2>{{.WorkflowName}}</h2>
  <div class="subtitle">Fill in the details to create a new instance</div>
  <form method="POST" action="/instance">
    {{csrfField .CurrentUser}}
    <input type="hidden" name="workflow" value="{{.WorkflowName}}">
    <div class="field">
      <label>Title</label>
      <input type="text" name="title" value="{{.Title}}" placeholder="Instance title…" autofocus>
    </div>
    <div class="field">
      <label>Priority</label>
      <select name="priority">
        <option value="low"{{if eq .Priority "low"}} selected{{end}}>Low</option>
        <option value="medium"{{if or (eq .Priority "medium") (eq .Priority "")}} selected{{end}}>Medium</option>
        <option value="high"{{if eq .Priority "high"}} selected{{end}}>High</option>
      </select>
    </div>
    {{if .Vars}}
    <hr class="divider">
    {{range .Vars}}
    <div class="field">
      <label>{{.}}</label>
      <input type="text" name="var_{{.}}" placeholder="{{.}}…">
      <div class="var-hint">Used as ${{.}} in this workflow</div>
    </div>
    {{end}}
    {{end}}
    <div class="actions">
      <a href="/" class="btn btn-cancel">Cancel</a>
      <button type="submit" class="btn btn-primary">Create →</button>
    </div>
  </form>
</div>
</body>
</html>
{{end}}
