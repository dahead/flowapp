{{define "login.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login — FlowApp</title>
<script>(function(){ const t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); document.documentElement.setAttribute('data-theme',t); })();</script>
<style>
:root { --bg:#e8eaf0; --bg2:#fff; --border:#d4d6e4; --text:#1a1a2e; --text3:#888; --accent:#6c63ff; --accent2:#574fd6; --red:#dc2626; }
[data-theme="dark"] { --bg:#0f0f17; --bg2:#1a1a2e; --border:#2e2e4a; --text:#e8e8f0; --text3:#5a5a7a; --accent:#7c73ff; --accent2:#6c63ff; --red:#f87171; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--bg2);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.12);padding:2.5rem 2rem;width:380px;max-width:95vw;border:1px solid var(--border);}
.logo{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:0.25rem;} .logo span{color:var(--accent);}
.subtitle{font-size:0.85rem;color:var(--text3);margin-bottom:2rem;}
.field{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:1rem;}
.field label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);}
.field input{border:1.5px solid var(--border);border-radius:8px;padding:0.55rem 0.75rem;font-size:0.95rem;font-family:inherit;outline:none;background:var(--bg);color:var(--text);}
.field input:focus{border-color:var(--accent);}
.btn{width:100%;padding:0.65rem;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600;margin-top:0.5rem;}
.btn:hover{background:var(--accent2);}
.error{background:#fee2e2;color:var(--red);border-radius:8px;padding:0.6rem 0.8rem;font-size:0.85rem;margin-bottom:1rem;}
[data-theme="dark"] .error{background:#2a1010;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>App</span></div>
  <div class="subtitle">Bitte anmelden</div>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/login">
    <input type="hidden" name="next" value="{{.Next}}">
    <div class="field"><label>E-Mail</label><input type="email" name="email" autofocus required></div>
    <div class="field"><label>Passwort</label><input type="password" name="password" required></div>
    <button class="btn" type="submit">Anmelden</button>
  </form>
</div>
</body>
</html>
{{end}}
