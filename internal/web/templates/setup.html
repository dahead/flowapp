{{define "setup.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
{{template "head-base" .}}
<title>Setup — FlowApp</title>
<link rel="stylesheet" href="/static/auth.css">
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>App</span></div>
  <div class="subtitle">First setup</div>
  <div class="badge">👑 create admin account</div>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/setup">
                {{csrfField .CurrentUser}}
    <div class="field"><label>Name</label><input type="text" name="name" placeholder="Your name" autofocus required></div>
    <div class="field"><label>E-Mail</label><input type="email" name="email" placeholder="your.mail@company.com" required></div>
    <div class="field"><label>Password</label><input type="password" name="password" placeholder="min. 8 characters" required></div>
    <div class="field"><label>Password confirmed</label><input type="password" name="confirm" required></div>
    <button class="btn" type="submit">Create account & start</button>
  </form>
</div>
</body>
</html>
{{end}}
