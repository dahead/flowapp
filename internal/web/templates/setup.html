{{define "setup.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
{{template "head-base" .}}
<title>Setup — FlowApp</title>
<link rel="stylesheet" href="/static/auth.css">
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>App</span></div>
  <div class="subtitle">Ersteinrichtung</div>
  <div class="badge">👑 Admin-Account anlegen</div>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/setup">
                {{csrfField .CurrentUser}}
    <div class="field"><label>Name</label><input type="text" name="name" placeholder="Max Mustermann" autofocus required></div>
    <div class="field"><label>E-Mail</label><input type="email" name="email" placeholder="admin@firma.de" required></div>
    <div class="field"><label>Passwort</label><input type="password" name="password" placeholder="min. 8 Zeichen" required></div>
    <div class="field"><label>Passwort bestätigen</label><input type="password" name="confirm" required></div>
    <button class="btn" type="submit">Account anlegen & starten</button>
  </form>
</div>
</body>
</html>
{{end}}
